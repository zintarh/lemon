# Used when Railway **Root Directory** = `agent` (single package).
# If Root Directory = repo root, prefer root `npm run build:agent` + `node agent/dist/index.js` (see railway.json).

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "AGENT_PORT=$PORT node dist/index.js"
