# Use when Railway **Root Directory** = `agent` (only this package in WORKDIR).
# For **repo root** deploy, use `agent/railway.json` or: build `npm run build:agent`, start `node agent/dist/index.js`.
[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "AGENT_PORT=$PORT node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
